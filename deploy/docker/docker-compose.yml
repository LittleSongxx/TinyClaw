services:
  hf-embeddings:
    profiles:
      - knowledge
    # Use the CPU image by default for maximum compatibility across hosts.
    image: ${HF_EMBEDDINGS_IMAGE:-ghcr.io/huggingface/text-embeddings-inference:cpu-1.9}
    restart: unless-stopped
    command:
      - --model-id
      - ${EMBEDDING_MODEL_ID:-BAAI/bge-small-zh-v1.5}
      - --port
      - "80"
      - --auto-truncate
    volumes:
      - hf-model-cache:/data

  postgres:
    profiles:
      - knowledge
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tinyclaw}
      POSTGRES_USER: ${POSTGRES_USER:-tinyclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tinyclawpass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tinyclaw} -d ${POSTGRES_DB:-tinyclaw}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    profiles:
      - knowledge
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - redis-data:/data

  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    profiles:
      - full
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      - etcd
      - -advertise-client-urls=http://127.0.0.1:2379
      - -listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - milvus-etcd:/etcd

  minio:
    profiles:
      - knowledge
      - full
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command:
      - minio
      - server
      - /data
      - --console-address
      - :9001
    volumes:
      - milvus-minio:/data

  milvus:
    image: milvusdb/milvus:v2.5.14
    profiles:
      - full
    restart: unless-stopped
    command:
      - milvus
      - run
      - standalone
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      - etcd
      - minio

  playwright-mcp:
    image: mcr.microsoft.com/playwright/mcp:latest
    restart: unless-stopped
    init: true
    command:
      - --host
      - 0.0.0.0
      - --allowed-hosts
      - "*"
      - --headless
      - --browser
      - chromium
      - --no-sandbox
      - --port
      - "8931"

  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: tinyclaw-local:latest
    restart: unless-stopped
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    env_file:
      - .env
    environment:
      HTTP_HOST: ":36060"
      ADMIN_PORT: "18080"
      TZ: ${TZ}
      HOME: ${APP_HOME:-/app/data/home}
      XDG_CACHE_HOME: ${XDG_CACHE_HOME:-/app/data/.cache}
      GATEWAY_WS_PATH: ${GATEWAY_WS_PATH:-/gateway/ws}
      GATEWAY_NODE_WS_PATH: ${GATEWAY_NODE_WS_PATH:-/gateway/nodes/ws}
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET:-}
      SESSION_TRANSCRIPT_DIR: ${SESSION_TRANSCRIPT_DIR:-/app/data/sessions}
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      USE_TOOLS: ${USE_TOOLS:-true}
      ENABLE_KNOWLEDGE: ${ENABLE_KNOWLEDGE:-false}
      ENABLE_MEDIA: ${ENABLE_MEDIA:-false}
      ENABLE_CRON: ${ENABLE_CRON:-false}
      ENABLE_LEGACY_BOTS: ${ENABLE_LEGACY_BOTS:-false}
      ENABLE_LEGACY_MCP_PROXY: ${ENABLE_LEGACY_MCP_PROXY:-false}
      ENABLE_LEGACY_TASK_TOOLS: ${ENABLE_LEGACY_TASK_TOOLS:-false}
      ENABLE_EXPERIMENTAL_WORKFLOW: ${ENABLE_EXPERIMENTAL_WORKFLOW:-false}
      EMBEDDING_TYPE: ${EMBEDDING_TYPE:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_MODEL_ID: ${EMBEDDING_MODEL_ID:-}
      EMBEDDING_QUERY_INSTRUCTION: ${EMBEDDING_QUERY_INSTRUCTION:-}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-512}
      CHUNK_SIZE: ${CHUNK_SIZE:-500}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-50}
      POSTGRES_DSN: ${POSTGRES_DSN:-}
      REDIS_ADDR: ${REDIS_ADDR:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-}
      MINIO_BUCKET: ${MINIO_BUCKET:-tinyclaw-knowledge}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      DEFAULT_KNOWLEDGE_BASE: ${DEFAULT_KNOWLEDGE_BASE:-default}
      DEFAULT_COLLECTION: ${DEFAULT_COLLECTION:-default}
      KNOWLEDGE_AUTO_MIGRATE: ${KNOWLEDGE_AUTO_MIGRATE:-true}
      RERANKER_BASE_URL: ${RERANKER_BASE_URL:-}
    depends_on:
      - playwright-mcp
    ports:
      - "${HOST_HTTP_PORT:-36060}:36060"
      - "${HOST_ADMIN_PORT:-18080}:18080"
    volumes:
      - ../../data:/app/data
      - ../../log:/app/log
      - ../..:/workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:36060/pong >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles:
      - cloudflared
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    command:
      - tunnel
      - --no-autoupdate
      - --url
      - http://app:36060

volumes:
  hf-model-cache:
  postgres-data:
  redis-data:
  milvus-etcd:
  milvus-minio:
  milvus-data:
