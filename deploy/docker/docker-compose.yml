services:
  hf-embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:89-1.9
    restart: unless-stopped
    gpus: all
    command:
      - --model-id
      - ${EMBEDDING_MODEL_ID:-BAAI/bge-small-zh-v1.5}
      - --port
      - "80"
      - --auto-truncate
    volumes:
      - hf-model-cache:/data

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tinyclaw}
      POSTGRES_USER: ${POSTGRES_USER:-tinyclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tinyclawpass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tinyclaw} -d ${POSTGRES_DB:-tinyclaw}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - redis-data:/data

  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      - etcd
      - -advertise-client-urls=http://127.0.0.1:2379
      - -listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - milvus-etcd:/etcd

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command:
      - minio
      - server
      - /data
      - --console-address
      - :9001
    volumes:
      - milvus-minio:/data

  milvus:
    image: milvusdb/milvus:v2.5.14
    restart: unless-stopped
    command:
      - milvus
      - run
      - standalone
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      - etcd
      - minio

  playwright-mcp:
    image: mcr.microsoft.com/playwright/mcp:latest
    restart: unless-stopped
    init: true
    command:
      - --host
      - 0.0.0.0
      - --allowed-hosts
      - "*"
      - --headless
      - --browser
      - chromium
      - --no-sandbox
      - --port
      - "8931"

  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: tinyclaw-local:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HTTP_HOST: ":36060"
      ADMIN_PORT: "18080"
      TZ: ${TZ}
    depends_on:
      - hf-embeddings
      - postgres
      - redis
      - minio
      - milvus
      - playwright-mcp
    ports:
      - "${HOST_HTTP_PORT:-36060}:36060"
      - "${HOST_ADMIN_PORT:-18080}:18080"
    volumes:
      - ../../data:/app/data
      - ../../log:/app/log
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:36060/pong >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles:
      - cloudflared
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    command:
      - tunnel
      - --no-autoupdate
      - --url
      - http://app:36060

volumes:
  hf-model-cache:
  postgres-data:
  redis-data:
  milvus-etcd:
  milvus-minio:
  milvus-data:
